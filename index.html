<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 Forbidden - Access Denied</title>
    
    <!-- Meta Tags de Segurança Básica (Headers) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <meta name="robots" content="noindex, nofollow">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Roboto', Arial, sans-serif;
            color: #202124;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Impede rolagem */
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        h1 {
            font-size: 100px;
            margin: 0;
            color: #4285f4; /* Azul Google */
            font-weight: 300;
        }

        h2 {
            font-size: 24px;
            margin: 10px 0 20px 0;
            font-weight: 400;
        }

        p {
            color: #5f6368;
            line-height: 1.5;
            font-size: 16px;
        }

        .security-badge {
            margin-top: 40px;
            padding: 15px;
            border-top: 1px solid #dadce0;
            font-size: 12px;
            color: #9aa0a6;
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3498db;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 2s linear infinite; /* Safari */
            animation: spin 2s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Esconde o conteúdo se o JS estiver desativado */
        noscript {
            display: block;
            background: red;
            color: white;
            padding: 20px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Aviso para quem desativa Javascript -->
    <noscript>
        ERRO CRÍTICO: Javascript é obrigatório para a segurança deste servidor.
    </noscript>

    <div class="container" id="main-content">
        <h1>403</h1>
        <h2>Forbidden</h2>
        <p>
            <span class="loader"></span>
            <strong>Proteção Ativa:</strong> Acesso negado pelo Google Cloud Armor / WAF.<br>
            Sua solicitação parece suspeita ou foi bloqueada por uma regra de segurança antibot.
        </p>
        <p style="font-size: 12px; margin-top: 20px;">
            Reference ID: <span id="ref-id"></span><br>
            IP: <span id="user-ip">Detectando...</span>
        </p>

        <div class="security-badge">
            <p>Proteção DDoS & Anti-Bot habilitada.<br>
            Este site é protegido pelo Google Cloud.</p>
        </div>
    </div>

    <script>
        // 1. Gera um ID de referência falso para parecer profissional
        document.getElementById('ref-id').innerText = Math.random().toString(36).substring(2, 15).toUpperCase();

        // 2. Tenta pegar o IP do usuário via API pública (apenas visual)
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('user-ip').innerText = data.ip;
            })
            .catch(err => {
                document.getElementById('user-ip').innerText = "Oculto/Proxy Detectado";
            });

        // 3. PROTEÇÃO ANTI-DEVELOPER TOOLS (F12)
        // Isso irrita quem tenta inspecionar o código
        document.onkeydown = function(e) {
            if (e.keyCode == 123) { // F12
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { // Ctrl+Shift+C
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { // Ctrl+Shift+J
                return false;
            }
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // Ctrl+U (Ver código fonte)
                return false;
            }
        }

        // 4. BLOQUEIO DE CLIQUE DIREITO
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 5. DETECÇÃO DE BOT SIMPLES (Console Trap)
        // Se alguém abrir o console, o site "trava" ou limpa o console
        setInterval(() => {
            const start = performance.now();
            debugger; // Isso pausa a execução se o DevTools estiver aberto
            const end = performance.now();
            if (end - start > 100) {
                // Se demorou muito (porque o debugger pausou), recarrega a página ou limpa
                document.body.innerHTML = ""; 
                document.write("<h1 style='color:red; text-align:center; margin-top:20%'>TENTATIVA DE HACKING DETECTADA. CONEXÃO ENCERRADA.</h1>");
            }
        }, 1000);

        // 6. DETECÇÃO DE AUTOMAÇÃO (Selenium/Puppeteer)
        if (navigator.webdriver) {
             document.body.innerHTML = ""; 
             document.write("<h1 style='color:red; text-align:center; margin-top:20%'>BOT AUTOMATIZADO DETECTADO. ACESSO BLOQUEADO.</h1>");
        }
    </script>
</body>
</html>
