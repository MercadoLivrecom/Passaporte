<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Checker - Multi API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #00d9ff;
        }
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 5px;
            color: #00d9ff;
            font-weight: bold;
        }
        select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #00d9ff;
            border-radius: 5px;
            background: #16213e;
            color: #fff;
            font-family: monospace;
        }
        select { cursor: pointer; }
        textarea { height: 150px; margin-bottom: 10px; }
        button {
            width: 100%;
            padding: 12px;
            background: #00d9ff;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover { background: #00b8d4; }
        button:disabled { background: #555; cursor: not-allowed; }
        .result {
            background: #16213e;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 4px solid #555;
        }
        .result.valid { border-left-color: #00ff88; }
        .result.invalid { border-left-color: #ff4444; }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .card-number {
            font-size: 1.2em;
            font-weight: bold;
            color: #00d9ff;
            font-family: monospace;
        }
        .copy-btn {
            background: #0f3460;
            color: #fff;
            border: none;
            padding: 5px 15px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .copy-btn:hover { background: #00d9ff; color: #1a1a2e; }
        .copy-btn.copied { background: #00ff88; color: #000; }
        .status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 3px;
            font-size: 0.85em;
            font-weight: bold;
        }
        .status.valid { background: #00ff88; color: #000; }
        .status.invalid { background: #ff4444; color: #fff; }
        .info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px;
            font-size: 0.9em;
            margin-top: 10px;
        }
        .info-item {
            background: #0f3460;
            padding: 8px 12px;
            border-radius: 3px;
        }
        .label { color: #888; font-size: 0.8em; margin-bottom: 3px; }
        .value { color: #fff; font-weight: bold; }
        .error-msg {
            background: #ff444433;
            color: #ff4444;
            padding: 8px 12px;
            border-radius: 3px;
            margin-top: 10px;
            font-size: 0.9em;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .stat {
            background: #16213e;
            padding: 15px 25px;
            border-radius: 5px;
            text-align: center;
        }
        .stat-value { font-size: 1.8em; font-weight: bold; }
        .stat.valid { color: #00ff88; }
        .stat.invalid { color: #ff4444; }
        .api-info {
            background: #0f3460;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
        .api-info strong { color: #00d9ff; }
        .proxy-notice {
            background: #f59e0b22;
            border: 1px solid #f59e0b;
            color: #f59e0b;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💳 Card Checker - Multi API</h1>
        
        <div class="proxy-notice">
            ⚠️ <strong>Proxy CORS ativo:</strong> Requisições passam por proxy automaticamente
        </div>
        
        <div class="form-group">
            <label for="apiSelect">🔧 Escolha a API:</label>
            <select id="apiSelect">
                <option value="handyapi">HandyAPI (Recomendada ✅)</option>
                <option value="pulse">Pulse BIN (Rápida)</option>
                <option value="dnschecker">DNS Checker (Completa)</option>
            </select>
            <div class="api-info" id="apiInfo">
                <strong>HandyAPI:</strong> API completa e estável. Retorna BIN, Banco, Bandeira, Tipo, País e Nível do cartão.
            </div>
        </div>
        
        <div class="form-group">
            <label for="cards">📥 Cole os Cartões:</label>
            <textarea id="cards" placeholder="Cole os cartões aqui (um por linha)&#10;Formato: 5353161234567890|12|2025|123&#10;ou apenas: 5353161234567890"></textarea>
        </div>
        
        <button onclick="checkCards()" id="btnCheck">🔍 Verificar Cartões</button>
        
        <div class="stats" id="stats" style="display:none;">
            <div class="stat">
                <div class="stat-value" id="total">0</div>
                <div>Total</div>
            </div>
            <div class="stat valid">
                <div class="stat-value" id="valid">0</div>
                <div>Válidos</div>
            </div>
            <div class="stat invalid">
                <div class="stat-value" id="invalid">0</div>
                <div>Inválidos</div>
            </div>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        let validCount = 0;
        let invalidCount = 0;

        // Proxies CORS
        const CORS_PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest='
        ];

        // Atualiza info da API quando muda
        document.getElementById('apiSelect').addEventListener('change', function() {
            const infoDiv = document.getElementById('apiInfo');
            const api = this.value;
            
            if (api === 'handyapi') {
                infoDiv.innerHTML = '<strong>HandyAPI:</strong> API completa e estável. Retorna BIN, Banco, Bandeira, Tipo, País e Nível do cartão.';
            } else if (api === 'pulse') {
                infoDiv.innerHTML = '<strong>Pulse BIN:</strong> API rápida e estável. Retorna BIN, Banco, Bandeira, País e Nível.';
            } else {
                infoDiv.innerHTML = '<strong>DNS Checker:</strong> Retorna Luhn, IIN, Banco, Bandeira, Tipo, País e mais detalhes.';
            }
        });

        function parseCard(line) {
            const parts = line.trim().split('|');
            const number = parts[0].replace(/\s/g, '');
            return {
                number: number,
                month: parts[1] || '',
                year: parts[2] || '',
                cvv: parts[3] || '',
                raw: line.trim(),
                bin: number.substring(0, 6)
            };
        }

        async function fetchWithProxy(url, options = {}) {
            for (const proxy of CORS_PROXIES) {
                try {
                    const proxyUrl = proxy + encodeURIComponent(url);
                    const response = await fetch(proxyUrl, options);
                    if (response.ok) return response;
                } catch (error) {
                    continue;
                }
            }
            throw new Error('Todos os proxies falharam');
        }

        async function checkCardHandyAPI(card) {
            try {
                const bin = card.bin;
                const apiUrl = `https://data.handyapi.com/bin/${bin}`;
                
                const response = await fetchWithProxy(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                });
                
                const data = await response.json();
                
                const result = {
                    card: card,
                    valid: false,
                    brand: '',
                    bank: '',
                    type: '',
                    country: '',
                    level: '',
                    errors: []
                };

                if (data) {
                    result.brand = data.brand || data.scheme || 'Desconhecido';
                    result.bank = data.bank || data.issuer || data.issuer_name || 'Desconhecido';
                    result.type = data.type || data.card_type || 'Desconhecido';
                    result.country = data.country || data.country_name || data.country_alpha3 || 'Desconhecido';
                    result.level = data.level || data.card_level || 'Desconhecido';
                    
                    // Considera válido se retornou dados
                    result.valid = result.brand !== 'Desconhecido' && result.bank !== 'Desconhecido';
                } else {
                    result.errors.push('BIN não encontrado');
                    result.valid = false;
                }

                return result;
            } catch (error) {
                return {
                    card: card,
                    valid: false,
                    brand: 'Erro',
                    bank: 'Erro',
                    type: 'Erro',
                    country: 'Erro',
                    level: 'Erro',
                    errors: [`Erro: ${error.message}`]
                };
            }
        }

        async function checkCardPulse(card) {
            try {
                const bin = card.bin;
                const apiUrl = `https://pulse.pst.net/api/bins/${bin}`;
                
                const response = await fetchWithProxy(apiUrl, {
                    method: 'GET',
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Linux; Android 15; 23100RN82L Build/AP3A.240905.015.A2) AppleWebKit/537.36',
                        'Referer': `https://pulse.pst.net/pt/bin/${bin}`,
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                const result = {
                    card: card,
                    valid: false,
                    brand: '',
                    bank: '',
                    type: '',
                    country: '',
                    level: '',
                    errors: []
                };

                if (data.data) {
                    result.brand = data.data.brand || 'Desconhecido';
                    result.bank = data.data.issuer_name || 'Desconhecido';
                    result.type = data.data.type || 'Desconhecido';
                    result.level = data.data.card_level || 'Desconhecido';
                    result.country = data.data.country_alpha3 || 'Desconhecido';
                    
                    result.valid = result.brand !== 'Desconhecido' && result.bank !== 'Desconhecido';
                } else {
                    result.errors.push('BIN não encontrado');
                    result.valid = false;
                }

                return result;
            } catch (error) {
                return {
                    card: card,
                    valid: false,
                    brand: 'Erro',
                    bank: 'Erro',
                    type: 'Erro',
                    country: 'Erro',
                    level: 'Erro',
                    errors: [`Erro: ${error.message}`]
                };
            }
        }

        async function checkCardDNSChecker(card) {
            try {
                const apiUrl = `https://dnschecker.org/ajax_files/credit_card_validator.php?ccn=${card.number}`;
                
                const response = await fetchWithProxy(apiUrl, {
                    headers: {
                        'Origin': 'https://dnschecker.org',
                        'Referer': 'https://dnschecker.org/credit-card-validator.php'
                    }
                });
                
                const text = await response.text();
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    return {
                        card: card,
                        valid: false,
                        brand: 'Erro',
                        bank: 'Erro',
                        type: 'Erro',
                        country: 'Erro',
                        level: '',
                        errors: ['Resposta inválida da API']
                    };
                }
                
                const result = {
                    card: card,
                    valid: false,
                    brand: '',
                    bank: '',
                    type: '',
                    country: '',
                    level: '',
                    errors: []
                };

                if (data.results) {
                    result.brand = data.results.network || 'N/A';
                    result.bank = data.results.bank || 'N/A';
                    result.type = data.results.card_type || 'N/A';
                    result.country = data.results.country || 'N/A';
                    result.level = data.results.mii || '';
                    
                    const luhnValid = data.results.luhn === 1 || data.results.luhn === '1';
                    const iinValid = data.results.iin_valid === 1 || data.results.iin_valid === '1';
                    result.valid = luhnValid && iinValid;
                    
                    if (data.errors?.length > 0) {
                        result.errors = data.errors;
                        result.valid = false;
                    }
                } else {
                    result.errors.push('Sem dados da API');
                    result.valid = false;
                }

                return result;
            } catch (error) {
                return {
                    card: card,
                    valid: false,
                    brand: 'Erro',
                    bank: 'Erro',
                    type: 'Erro',
                    country: 'Erro',
                    level: 'Erro',
                    errors: [`Erro: ${error.message}`]
                };
            }
        }

        async function checkCard(card) {
            const selectedAPI = document.getElementById('apiSelect').value;
            
            if (selectedAPI === 'handyapi') {
                return await checkCardHandyAPI(card);
            } else if (selectedAPI === 'pulse') {
                return await checkCardPulse(card);
            } else {
                return await checkCardDNSChecker(card);
            }
        }

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.textContent;
                btn.textContent = '✓ Copiado!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = original;
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
                btn.textContent = '✓ Copiado!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '📋 Copiar';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function displayResult(result, index) {
            const div = document.createElement('div');
            div.className = `result ${result.valid ? 'valid' : 'invalid'}`;
            
            const formatted = result.card.number.match(/.{1,4}/g)?.join(' ') || result.card.number;
            const fullCard = result.card.cvv 
                ? `${result.card.number}|${result.card.month}|${result.card.year}|${result.card.cvv}`
                : `${result.card.number}|${result.card.month}|${result.card.year}`;
            
            div.innerHTML = `
                <div class="card-header">
                    <div class="card-number">${formatted}</div>
                    <div>
                        <button class="copy-btn" onclick="copyToClipboard('${fullCard}', this)">📋 Copiar</button>
                        <span class="status ${result.valid ? 'valid' : 'invalid'}">
                            ${result.valid ? '✓ VÁLIDO' : '✗ INVÁLIDO'}
                        </span>
                    </div>
                </div>
                <div class="info">
                    <div class="info-item"><div class="label">🏷️ Bandeira</div><div class="value">${result.brand}</div></div>
                    <div class="info-item"><div class="label">🏦 Banco</div><div class="value">${result.bank}</div></div>
                    <div class="info-item"><div class="label">💳 Tipo</div><div class="value">${result.type}</div></div>
                    <div class="info-item"><div class="label">🌍 País</div><div class="value">${result.country}</div></div>
                    ${result.level ? `<div class="info-item"><div class="label">👑 Nível</div><div class="value">${result.level}</div></div>` : ''}
                    ${result.card.month ? `<div class="info-item"><div class="label">📅 Validade</div><div class="value">${result.card.month}/${result.card.year||'****'}</div></div>` : ''}
                    ${result.card.cvv ? `<div class="info-item"><div class="label">🔐 CVV</div><div class="value">${result.card.cvv}</div></div>` : ''}
                </div>
                ${result.errors.length > 0 ? `<div class="error-msg">⚠️ ${result.errors.join(', ')}</div>` : ''}
            `;
            document.getElementById('results').appendChild(div);
        }

        async function checkCards() {
            const input = document.getElementById('cards').value.trim();
            if (!input) { alert('Cole os cartões primeiro!'); return; }

            const cards = input.split('\n').map(parseCard).filter(c => c?.number?.length >= 13);
            if (cards.length === 0) { alert('Nenhum cartão válido encontrado!'); return; }

            document.getElementById('btnCheck').disabled = true;
            document.getElementById('btnCheck').textContent = '⏳ Verificando...';
            document.getElementById('results').innerHTML = '';
            document.getElementById('stats').style.display = 'flex';
            
            validCount = 0;
            invalidCount = 0;
            
            for (let i = 0; i < cards.length; i++) {
                const result = await checkCard(cards[i]);
                result.valid ? validCount++ : invalidCount++;
                displayResult(result, i + 1);
                updateStats();
                await new Promise(r => setTimeout(r, 800));
            }
            
            document.getElementById('btnCheck').disabled = false;
            document.getElementById('btnCheck').textContent = '🔍 Verificar Cartões';
        }

        function updateStats() {
            document.getElementById('total').textContent = validCount + invalidCount;
            document.getElementById('valid').textContent = validCount;
            document.getElementById('invalid').textContent = invalidCount;
        }
    </script>
</body>
</html>
